<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff3d4f" />
    <meta
      name="description"
      content="がんばった一日をレッドカーペットでほめる、ごほうびケーキ型のスマホWebアプリプロトタイプです。"
    />
    <title>ごほうびレッドカーペット</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="ごほうびレッドカーペット">
      <section class="phone" aria-live="polite">
        <div class="status-bar" aria-hidden="true">
          <span>9:41</span>
          <span>●●● 5G ▰</span>
        </div>

        <div class="confetti-layer" aria-hidden="true"></div>
        <section class="screen" id="screen"></section>

        <nav class="tabbar" aria-label="メインメニュー">
          <button class="tab active" type="button" data-nav="home">
            <span>⌂</span>
            ホーム
          </button>
          <button class="tab" type="button" data-nav="nominate">
            <span>♕</span>
            ノミネート
          </button>
          <button class="tab" type="button" data-nav="cheer">
            <span>♥</span>
            応援
          </button>
          <button class="tab" type="button" data-nav="roulette">
            <span>◉</span>
            ルーレット
          </button>
          <button class="tab" type="button" data-nav="profile">
            <span>●</span>
            マイページ
          </button>
        </nav>
      </section>

      <div class="toast" id="toast" role="status"></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
