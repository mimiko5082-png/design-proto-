<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#102b2a" />
    <meta
      name="description"
      content="現在地の許可がある時だけ候補を1つ決め、行った人が20字までの名前と写真1枚だけを残すWebアプリ。"
    />
    <title>UNDISCOVERED</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="phone" aria-label="UNDISCOVERED">
        <header class="topbar">
          <div>
            <p>NO STARS, JUST NAMES</p>
            <h1>UNDISCOVERED</h1>
          </div>
          <span class="brand-mark" aria-hidden="true">U</span>
        </header>

        <nav class="progress" aria-label="進行状況" id="progress"></nav>
        <section class="screen" id="screen"></section>
      </section>

      <div class="toast" id="toast" role="status"></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
